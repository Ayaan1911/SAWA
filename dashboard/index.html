<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAWA Dashboard</title>
    <style>
      :root {
        --bg: #111827;
        --panel: #1f2937;
        --line: #334155;
        --text: #e5eef7;
        --muted: #93a4b8;
        --accent: #f59e0b;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1e293b, var(--bg) 65%);
        color: var(--text);
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 42px;
      }
      p {
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        margin-top: 28px;
      }
      .panel {
        background: rgba(31, 41, 55, 0.9);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
      }
      button {
        background: var(--accent);
        color: #1a1305;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SAWA Dashboard</h1>
      <p>Operational visibility into the autonomous heartbeat loop and memory vault.</p>
      <button id="run">Run Heartbeat</button>
      <div class="grid">
        <section class="panel">
          <h2>Vault</h2>
          <pre id="vault">Loading...</pre>
        </section>
        <section class="panel">
          <h2>Latest Heartbeat</h2>
          <pre id="heartbeat">Idle</pre>
        </section>
      </div>
    </main>
    <script>
      const vaultTarget = document.getElementById('vault');
      const heartbeatTarget = document.getElementById('heartbeat');
      const runButton = document.getElementById('run');

      async function loadVault() {
        const response = await fetch('/api/vault');
        const payload = await response.json();
        vaultTarget.textContent = JSON.stringify(payload, null, 2);
      }

      async function runHeartbeat() {
        heartbeatTarget.textContent = 'Running...';
        const response = await fetch('/api/heartbeat/run', { method: 'POST' });
        const payload = await response.json();
        heartbeatTarget.textContent = JSON.stringify(payload, null, 2);
        loadVault();
      }

      runButton.addEventListener('click', runHeartbeat);
      loadVault();
    </script>
  </body>
</html>
